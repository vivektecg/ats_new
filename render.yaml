services:
  - type: web
    name: eventus-ats
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    preDeployCommand: npm run db:migrate
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: ATS_STORAGE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: eventus-ats-db
          property: connectionString
      - key: LLM_API_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false

databases:
  - name: eventus-ats-db
    plan: basic-256mb
    region: singapore
    databaseName: eventus_ats
