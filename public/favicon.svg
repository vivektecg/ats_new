<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="The Eventus Consulting Group">
  <defs>
    <linearGradient id="eventus-bg" x1="14" y1="8" x2="84" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="54%" stop-color="#1e3a5f" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <radialGradient id="eventus-glow" cx="32%" cy="18%" r="78%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="48%" stop-color="#2dd4bf" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0" />
    </radialGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#020617" flood-opacity="0.44" />
    </filter>
  </defs>

  <style>
    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes scan {
      0%, 100% { transform: translateY(-24px); opacity: 0; }
      20%, 75% { opacity: 0.9; }
      50% { transform: translateY(24px); opacity: 0.62; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(45, 212, 191, 0.46)); }
      50% { transform: scale(1.04); filter: drop-shadow(0 0 16px rgba(203, 213, 225, 0.58)); }
    }
    .orbit {
      animation: orbit 7s linear infinite;
      transform-origin: 48px 48px;
    }
    .scan {
      animation: scan 2.8s ease-in-out infinite;
    }
    .mark {
      animation: pulse 3.2s ease-in-out infinite;
      transform-origin: 48px 48px;
    }
  </style>

  <rect width="96" height="96" rx="24" fill="#17243a" />
  <g filter="url(#soft-shadow)">
    <rect x="11" y="11" width="74" height="74" rx="22" fill="url(#eventus-bg)" />
    <rect x="11" y="11" width="74" height="74" rx="22" fill="url(#eventus-glow)" />
  </g>

  <g class="orbit" opacity="0.76">
    <ellipse cx="48" cy="48" rx="34" ry="20" fill="none" stroke="#ccfbf1" stroke-width="2" stroke-opacity="0.44" />
    <circle cx="82" cy="48" r="3.5" fill="#2dd4bf" />
  </g>
  <g class="orbit" opacity="0.56" style="animation-duration: 10s; animation-direction: reverse;">
    <ellipse cx="48" cy="48" rx="22" ry="34" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-opacity="0.42" />
    <circle cx="48" cy="14" r="3" fill="#cbd5e1" />
  </g>

  <path class="scan" d="M24 48 H72" stroke="#f8fafc" stroke-width="3" stroke-linecap="round" opacity="0.72" />
  <text class="mark" x="48" y="59" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#ffffff">EC</text>
</svg>
